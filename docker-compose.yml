# ─────────────────────────────────────────────────────────────────────────────
# AI Voice Studio — Docker Compose
#
# Usage:
#   1. Copy backend/.env.example → backend/.env and set OPENAI_API_KEY
#   2. docker compose up --build
#   3. Open http://localhost (frontend) or http://localhost:8080 (backend API)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Spring Boot backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tts-backend
    # Read the API key from backend/.env — this is the single source of truth.
    # env_file loads variables BEFORE the environment: block, so any environment:
    # entry (even an empty one like ${OPENAI_API_KEY:-}) would silently override it.
    # Keep env_file only to avoid that bug.
    env_file:
      - ./backend/.env
    ports:
      # Expose 8080 for direct API testing with curl / Postman.
      # In production you can remove this and let Nginx proxy handle all traffic.
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - tts-network

  # ── React frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tts-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tts-network

networks:
  tts-network:
    driver: bridge
