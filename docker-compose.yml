# ─────────────────────────────────────────────────────────────────────────────
# AI Voice Studio — Docker Compose
#
# Usage:
#   1. Copy backend/.env.example → backend/.env and set OPENAI_API_KEY
#   2. docker compose up --build
#   3. Open http://localhost (frontend) or http://localhost:8080 (backend API)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Spring Boot backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tts-backend
    # Read the API key from backend/.env — this is the single source of truth.
    env_file:
      - ./backend/.env
    # Use host networking so the container shares the host's network stack.
    # This allows the backend to reach api.openai.com even when Docker bridge
    # containers are blocked by the host firewall. Port 8080 is exposed on
    # the host automatically — no port mapping needed.
    network_mode: host
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── React frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tts-frontend
    ports:
      - "80:80"
    # Resolve 'backend' to the host gateway so Nginx can proxy to the Spring Boot
    # backend which runs in host network mode on port 8080.
    extra_hosts:
      - "backend:172.17.0.1"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tts-network

networks:
  tts-network:
    driver: bridge
