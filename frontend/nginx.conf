server {
    listen 80;
    server_name _;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy all /api/* calls to the Spring Boot backend ─────────────────────
    # The backend hostname "backend" resolves via Docker Compose's internal DNS.
    # This is the key piece that removes the need for CORS in production.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts to accommodate potentially slow TTS generation
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Pass large audio responses without buffering to temp files
        proxy_buffering off;
    }

    # ── React app (SPA) — send all other routes to index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header Referrer-Policy         strict-origin-when-cross-origin;
}
